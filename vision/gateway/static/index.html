<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision — AI Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--accent:#00d4ff;--text:#e0e0e0;--dim:#666;--user:#1a1a2e;--bot:#0d1117}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
header h1{font-size:18px;font-weight:600;color:var(--accent)}
header .status{width:8px;height:8px;border-radius:50%;background:#333}
header .status.on{background:#00ff88;box-shadow:0 0 6px #00ff88}
#chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;padding:12px 16px;border-radius:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;font-size:14px}
.msg.user{align-self:flex-end;background:var(--user);border:1px solid var(--border)}
.msg.bot{align-self:flex-start;background:var(--bot);border:1px solid var(--border)}
.msg.bot .label{color:var(--accent);font-size:11px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.msg.error{border-color:#ff4444;color:#ff6666}
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}
#input-bar{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:12px}
#input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;resize:none;max-height:120px;font-family:inherit}
#input:focus{border-color:var(--accent)}
#send{background:var(--accent);color:#000;border:none;border-radius:8px;padding:12px 24px;font-weight:600;cursor:pointer;font-size:14px}
#send:hover{opacity:.85}
#send:disabled{opacity:.4;cursor:default}
#clear{background:transparent;color:var(--dim);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;font-size:13px}
#clear:hover{color:var(--text);border-color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="status" id="status"></div>
  <h1>Vision</h1>
  <span style="color:var(--dim);font-size:13px">Self-improving AI Agent</span>
</header>
<div id="chat"></div>
<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Сообщение..." autofocus></textarea>
  <button id="send">Отправить</button>
  <button id="clear" title="Новый чат">Новый</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
let ws = null;
let sessionId = null;
let sending = false;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => statusEl.classList.add('on');
  ws.onclose = () => { statusEl.classList.remove('on'); setTimeout(connect, 2000); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'start') { sessionId = data.session_id; }
    else if (data.type === 'chunk') { appendChunk(data.content); }
    else if (data.type === 'done') { finishResponse(); }
    else if (data.type === 'error') { showError(data.content); finishResponse(); }
  };
}

let currentBotEl = null;
let currentText = '';

function appendChunk(text) {
  if (!currentBotEl) {
    removeTyping();
    currentBotEl = document.createElement('div');
    currentBotEl.className = 'msg bot';
    currentBotEl.innerHTML = '<div class="label">Vision</div><span></span>';
    chat.appendChild(currentBotEl);
    currentText = '';
  }
  currentText += text;
  currentBotEl.querySelector('span').textContent = currentText;
  chat.scrollTop = chat.scrollHeight;
}

function finishResponse() {
  currentBotEl = null;
  currentText = '';
  sending = false;
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

function showError(text) {
  const el = document.createElement('div');
  el.className = 'msg error';
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function send() {
  const text = input.value.trim();
  if (!text || sending || !ws || ws.readyState !== 1) return;
  sending = true;
  sendBtn.disabled = true;
  input.disabled = true;
  input.value = '';

  const userEl = document.createElement('div');
  userEl.className = 'msg user';
  userEl.textContent = text;
  chat.appendChild(userEl);
  chat.scrollTop = chat.scrollHeight;

  showTyping();
  ws.send(JSON.stringify({ message: text }));
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

document.getElementById('clear').addEventListener('click', () => {
  chat.innerHTML = '';
  sessionId = null;
  if (ws) ws.close();
  connect();
});

connect();
</script>
</body>
</html>
