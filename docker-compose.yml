version: '3.8'

services:
  vision:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      - VISION_TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - VISION_DB_PATH=/app/data/vision.db
    restart: unless-stopped

  # Optional: Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
